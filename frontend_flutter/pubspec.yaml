name: smart_city_emergency_system
description: Real-time smart city emergency response system.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0

  # App architecture / state
  provider: ^6.1.2

  # Location + maps
  geolocator: ^13.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Emergency voice input
  speech_to_text: ^7.3.0

  # Foreground notifications
  flutter_local_notifications: ^17.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.2
  http: ^1.6.0
  permission_handler: ^12.0.1
  telephony: ^0.2.0
  geoflutterfire_plus: ^0.0.32
  firebase_app_check: ^0.3.2+10
  csv: ^8.0.0
  google_maps_flutter: ^2.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/hospitals_minified.json
    - assets/hospital_directory.csv

